<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Submit Post</title>


  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  
  <link rel="stylesheet" href="newpost.css">
</head>
<body>
  <div class="container" id="formContainer">
    
    <form id="postForm">
      <p class="subheader">Share Your Voice</p>
      <p class="subdesc">Your post will be reviewed by the student council before publishing. You can post up to 3 times per week. All posts are anonymous.</p>

      <div class="form-group">
        <label><i class="fa-solid fa-heading"></i> Topic</label>
        <input id="topic" type="text" placeholder="e.g., 'Suggestion for Library Hours'" required>
      </div>

      <div class="form-group message-group">
        <label><i class="fa-solid fa-align-left"></i> Message</label>
        <textarea id="message" placeholder="Share your thoughts, suggestions, or concerns..." required></textarea>
        <button type="button" class="suggest-btn"><i class="fa-solid fa-wand-magic-sparkles"></i> Suggest Topics</button>
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-image"></i> Image (Optional)</label>
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <p>Click to upload an image</p>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <div class="preview" id="preview"></div>
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-tags"></i> Category</label>
        <select id="category" required>
          <option value="">Select Category</option>
          <option>School</option>
          <option>Events</option>
          <option>Office</option>
          <option>Teachers</option>
          <option>Staff</option>
          <option>Students</option>
        </select>
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-eye"></i> Post Visibility</label>
        <select id="postvisibility" required>
          <option value="">Select Visibility</option>
          <option>Public</option>
          <option>Private</option>
        </select>
      </div>

      <button type="submit" class="btn" id="submitBtn"><i class="fa-solid fa-paper-plane"></i> Submit</button>
    </form>

    <!-- SUCCESS -->
    <div class="success-message" id="successMessage" style="display: none;">
      <i class="fa-solid fa-circle-check"></i>
      <p>Your post has been submitted successfully!</p>
    </div>

  </div>

  <!-- Firebase & JS Logic -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import {
      initializeFirestore,
      addDoc,
      collection,
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    //  Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyC7oFziUJI6MVGh6CJ7ATfd8dw8BhRPfeA",
      authDomain: "tracescfeed.firebaseapp.com",
      projectId: "tracescfeed",
      storageBucket: "tracescfeed.firebasestorage.app",
      messagingSenderId: "700797865835",
      appId: "1:700797865835:web:65ac0701c50c13edb6062e"
    };

    //  Initialize Firebase
    const app = initializeApp(firebaseConfig);

    //  Connect to Firestore
    const db = initializeFirestore(app, {
      host: "asia-southeast1-firestore.googleapis.com",
      ssl: true,
    });

    //  Create new document in Firestore
    async function createMessage(event) {
      event.preventDefault();


      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';

      const topic = document.getElementById("topic").value.trim();
      const message = document.getElementById("message").value.trim();
      const category = document.getElementById("category").value.trim();
      const postvisibility = document.getElementById("postvisibility").value.trim();
      const createdBy = sessionStorage.getItem("studentNumber");

      if (!topic || !message || !category || !postvisibility) {
        alert("Please fill out all required fields.");
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Submit';
        return;
      }

      try {
        await addDoc(collection(db, "Feedback"), {
          topic,
          message,
          category,
          postvisibility,
          timestamp: new Date(),
          createdBy
        });

        console.log("✅ Document successfully created!");

        // Hide the form
        document.getElementById("postForm").style.display = "none";

        //  success message
        document.getElementById("successMessage").style.display = "block";
      } catch (error) {
        console.error("❌ Error creating document:", error);
        alert("Error creating document: " + error.message);

        // Re-enable button on failure
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Submit';
      }
    }

    // Submit listener
    document.getElementById("postForm").addEventListener("submit", createMessage);
    
  </script>
</body>
</html>
